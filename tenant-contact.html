<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lease Nexus | Tenant Inquiry</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: linear-gradient(135deg, #1a365d, #2c5282);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .form-container {
      background: white;
      border-radius: 32px;
      padding: 2rem;
      max-width: 800px;
      width: 100%;
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25);
    }
    h1 { color: #1a365d; margin-bottom: 0.5rem; }
    .form-group { margin-bottom: 1rem; }
    label { font-weight: 600; display: block; margin-bottom: 0.3rem; }
    input, select { width: 100%; padding: 0.7rem; border: 1px solid #cbd5e1; border-radius: 12px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1rem; }
    button {
      background: #1a365d;
      color: white;
      padding: 0.8rem;
      border: none;
      border-radius: 40px;
      font-weight: 600;
      width: 100%;
      cursor: pointer;
      margin-top: 1rem;
    }
    .back-link { display: inline-block; margin-top: 1rem; color: #64748b; text-decoration: none; }
    .toast {
      position: fixed;
      bottom: 2rem;
      right: 2rem;
      background: #0f172a;
      color: white;
      padding: 0.8rem 1.5rem;
      border-radius: 40px;
      display: none;
    }
    @media (max-width: 640px) { .form-row { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<div class="form-container">
  <h1><i class="fas fa-users"></i> Tenant Inquiry</h1>
  <p>Find your next home – fill the details and we will match you with available properties.</p>
  <form id="tenantForm">
    <h3>Basic Information</h3>
    <div class="form-row">
      <div class="form-group"><label>First Name *</label><input type="text" id="firstName" required></div>
      <div class="form-group"><label>Last Name *</label><input type="text" id="lastName" required></div>
    </div>
    <div class="form-group"><label>Email Address *</label><input type="email" id="email" required></div>
    <div class="form-group"><label>Phone *</label><input type="tel" id="phone" required></div>
    <div class="form-group"><label>Preferred Area (Postal code or specific area) *</label><input type="text" id="preferredArea" required></div>
    
    <h3>Property Preferences</h3>
    <div class="form-group"><label>House Type</label><select id="houseType"><option>Single Family</option><option>Full House</option><option>Basement</option><option>Upper Portion</option><option>Condo</option><option>Apartment</option><option>Townhouse</option></select></div>
    <div class="form-group"><label>Levels</label><select id="levels"><option>1</option><option>2</option><option>3</option></select></div>
    <div id="basementGroup" style="display:none;"><div class="form-group"><label>Basement Entrance</label><select id="basementEntrance"><option>Separate</option><option>Combined - No separation</option></select></div></div>
    <div class="form-group"><label>Bedrooms</label><select id="bedrooms"><option>1</option><option>2</option><option>3</option><option>4</option><option>5</option><option>6</option><option>7+</option></select></div>
    <div class="form-group"><label>Bathrooms</label><select id="bathrooms"><option>1</option><option>1.5</option><option>2</option><option>2.5</option><option>3</option><option>3.5</option><option>4</option><option>4.5</option><option>5+</option></select></div>
    <div class="form-group"><label>Kitchen</label><select id="kitchen"><option>1</option><option>2</option></select></div>
    <div class="form-group"><label>Garage</label><select id="garage"><option>No Garage</option><option>Single Car Garage</option><option>Double Car Garage</option><option>Street Parking</option><option>Parking Lot</option></select></div>
    <div class="form-group"><label>Expected Monthly Rent ($)</label><input type="number" step="0.01" id="expectedRent"></div>
    <div class="form-group"><label>Utilities</label><select id="utilities"><option>Included</option><option>Excluded</option></select></div>
    
    <button type="submit"><i class="fas fa-paper-plane"></i> Submit Inquiry</button>
  </form>
  <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Back to Home</a>
</div>
<div class="toast" id="toast"><i class="fas fa-check-circle"></i> <span id="toastMsg"></span></div>

<script>
  const API_BASE = 'https://leasenexus.onrender.com/api';
  function showToast(msg) {
    const toast = document.getElementById('toast');
    document.getElementById('toastMsg').innerText = msg;
    toast.style.display = 'flex';
    setTimeout(() => toast.style.display = 'none', 3000);
  }
  document.getElementById('levels').addEventListener('change', function() {
    document.getElementById('basementGroup').style.display = (this.value === '2' || this.value === '3') ? 'block' : 'none';
  });
  document.getElementById('tenantForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = e.target.querySelector('button');
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Submitting...';
    const payload = {
      type: 'tenant',
      first_name: document.getElementById('firstName').value,
      last_name: document.getElementById('lastName').value,
      email: document.getElementById('email').value,
      phone: document.getElementById('phone').value,
      preferred_area: document.getElementById('preferredArea').value,
      house_type: document.getElementById('houseType').value,
      levels: document.getElementById('levels').value,
      basement_entrance: document.getElementById('basementEntrance')?.value || null,
      bedrooms: document.getElementById('bedrooms').value,
      bathrooms: document.getElementById('bathrooms').value,
      kitchen: document.getElementById('kitchen').value,
      garage: document.getElementById('garage').value,
      expected_rent: parseFloat(document.getElementById('expectedRent').value) || null,
      utilities: document.getElementById('utilities').value
    };
    try {
      const res = await fetch(`${API_BASE}/lead/submit`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const data = await res.json();
      if (data.success) {
        showToast('Inquiry sent! We will contact you soon.');
        e.target.reset();
      } else throw new Error(data.error);
    } catch (err) {
      showToast('Error: ' + err.message);
    } finally {
      btn.disabled = false;
      btn.innerHTML = 'Submit Inquiry';
    }
  });
</script>
</body>
</html>
